name: Lido
options:
  bundleIdPrefix: com.adambeasant
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Lido:
    type: application
    platform: iOS
    sources:
      - Lido
    settings:
      base:
        INFOPLIST_FILE: Lido/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.adambeasant.lido
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Lido/App/Lido.entitlements
      properties:
        com.apple.developer.associated-domains:
          - "applinks:jaizsedfcbzgfaswzutt.supabase.co"
